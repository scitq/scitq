name: meteor2
version: "1.0.5"
description: "Taxonomic / functional profiling of metagenomic reads against a meteor2 catalog (meteor 2.0.22 3-stage pipeline: fastq → mapping → profile)"
container: quay.io/biocontainers/meteor:2.0.22--pyhdfd78af_0
language: bash

# Pull the companion setup module into any workflow that imports us.
# The YAML runner auto-injects `- import: metagenomics/meteor2_catalog`
# ahead of this step and auto-wires `depends: meteor2_catalog`, so a
# template just needs `- import: metagenomics/meteor2` to get the full
# catalog+compute pair wired correctly.
requires:
  - metagenomics/meteor2_catalog


# Pull the catalog into /resource with its subdirectory layout preserved:
# scitq's resource fetcher flattens bare directory downloads, so we
# explicitly un-flatten by listing each subtree with `|mv:<subdir>`. Meteor
# expects `/resource/fasta/*.bt2l` and `/resource/database/*.feather` plus
# the top-level reference.json, which the third URI drops at /resource/.
resource:
  - "{RESOURCE_ROOT}/meteor2/{params.meteor2_catalog}/fasta/|mv:fasta"
  - "{RESOURCE_ROOT}/meteor2/{params.meteor2_catalog}/database/|mv:database"
  - "{RESOURCE_ROOT}/meteor2/{params.meteor2_catalog}/{params.meteor2_catalog}_reference.json"

command:
  cond: PAIRED
  true: |
    . /builtin/std.sh
    mkdir -p /tmp/meteor/in
    cp /input/*.f*q.gz /tmp/meteor/in/
    meteor fastq   -i /tmp/meteor/in/     -p -m '{SAMPLE}' -o /tmp/meteor/fastq/
    meteor mapping -i /tmp/meteor/fastq/{SAMPLE}/   -r /resource/ -o /tmp/meteor/map/ -t ${CPU}
    meteor profile -i /tmp/meteor/map/{SAMPLE}/     -r /resource/ -o /output/

    # meteor profile leaves a symlink like <sample>_raw.tsv.xz pointing at
    # the mapping dir under /tmp (in-container absolute path). scitq uploads
    # /output from the host, where that target doesn't exist, so every such
    # symlink would upload-fail. Materialize while we're still in-container.
    find /output -type l | while read -r link; do
        target=$(readlink -f "$link" 2>/dev/null) || true
        if [ -n "$target" ] && [ -f "$target" ]; then
            rm "$link" && cp "$target" "$link"
        else
            rm -f "$link"
        fi
    done
  false: |
    . /builtin/std.sh
    mkdir -p /tmp/meteor/in
    cp /input/*.f*q.gz /tmp/meteor/in/
    meteor fastq   -i /tmp/meteor/in/        -m '{SAMPLE}' -o /tmp/meteor/fastq/
    meteor mapping -i /tmp/meteor/fastq/{SAMPLE}/   -r /resource/ -o /tmp/meteor/map/ -t ${CPU}
    meteor profile -i /tmp/meteor/map/{SAMPLE}/     -r /resource/ -o /output/

    # meteor profile leaves a symlink like <sample>_raw.tsv.xz pointing at
    # the mapping dir under /tmp (in-container absolute path). scitq uploads
    # /output from the host, where that target doesn't exist, so every such
    # symlink would upload-fail. Materialize while we're still in-container.
    find /output -type l | while read -r link; do
        target=$(readlink -f "$link" 2>/dev/null) || true
        if [ -n "$target" ] && [ -f "$target" ]; then
            rm "$link" && cp "$target" "$link"
        else
            rm -f "$link"
        fi
    done

outputs:
  profile: "*"

task_spec:
  cpu: 8
  mem: 32
