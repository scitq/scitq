name: metaphlan_catalog
version: "1.4.0"
description: |
  Download and cache the MetaPhlAn ChocoPhlAn database in the workspace
  resource tree. Runs once per workspace per (version, index) pair and is
  idempotent — combined with publish: + skip_if_exists, the first
  workflow that needs the DB pays the download cost; every subsequent
  workflow sees an already-populated publish URI and short-circuits.

  Designed as the catalog companion of `metagenomics/metaphlan`, mirroring
  the `metagenomics/meteor2_catalog` pattern: any template that imports
  `metagenomics/metaphlan` automatically gets this module injected via
  `requires:` and the per-sample task picks the database up from the
  shared resource path.

  v1.1.0: replaced `metaphlan --install` with explicit curl. The
  built-in installer downloads the same files but has no observable
  timeout — a stalled HTTP connection wedges silently for hours
  (observed). curl with `--connect-timeout` / `--max-time` /
  `--retry-all-errors` + resumable downloads is reliable.

language: bash
per_sample: false
skip_if_exists: true

vars:
  # MetaPhlAn major version. Mirrors `metagenomics/metaphlan`'s var of
  # the same name; both modules pick the matching container and CLI flag
  # via `cond: METAPHLAN_VERSION` so a workflow only sets it once.
  METAPHLAN_VERSION: "4.1"
  # CLI flag used to point at the database directory. 4.0 / 4.1 use
  # --bowtie2db; 4.2 renamed it to --db_dir.
  METAPHLAN_DB_FLAG:
    cond: METAPHLAN_VERSION
    "4.2": "--db_dir"
    "4.1": "--bowtie2db"
    "4.0": "--bowtie2db"
  # ChocoPhlAn catalog index. The cond: gives a sensible default per
  # MetaPhlAn major version, so workflows can simply set
  # METAPHLAN_VERSION and get a working catalog. To pin a different
  # release, override this var directly at the step level — a step-level
  # value replaces this whole cond: dict via vars merge. See:
  # http://cmprod1.cibio.unitn.it/biobakery4/metaphlan_databases/
  METAPHLAN_INDEX:
    cond: METAPHLAN_VERSION
    "4.0": "mpa_vOct22_CHOCOPhlAnSGB_202212"
    "4.1": "mpa_vOct22_CHOCOPhlAnSGB_202403"
    "4.2": "mpa_vJan25_CHOCOPhlAnSGB_202503"

container:
  cond: METAPHLAN_VERSION
  "4.0": "gmtscience/metaphlan4:4.0.6.1"
  "4.1": "gmtscience/metaphlan4:4.1"
  "4.2": "gmtscience/metaphlan:4.2.4"

# Cache catalogs by their own index name, not by metaphlan major
# version. Two catalogs for the same major version (e.g. the original
# vJan21 + the newer vOct22) can coexist in the workspace cache and
# pinning a custom INDEX never silently overwrites another workflow's
# default catalog. The per-sample `metagenomics/metaphlan` module reads
# from the same per-index path.
publish: "{RESOURCE_ROOT}/metaphlan/{METAPHLAN_INDEX}/"

resource: []

command: |
  set -euo pipefail
  . /builtin/std.sh

  mkdir -p /output/bowtie2
  cd /output/bowtie2

  INDEX="{METAPHLAN_INDEX}"
  if [ -z "$INDEX" ]; then
      echo "METAPHLAN_INDEX must be set — pin a ChocoPhlAn release explicitly" >&2
      echo "(e.g. mpa_vJan21_CHOCOPhlAnSGB_202103, mpa_vOct22_CHOCOPhlAnSGB_202403)." >&2
      exit 1
  fi

  BASE="http://cmprod1.cibio.unitn.it/biobakery4/metaphlan_databases"
  # 30s connect timeout, 4h cap (the bowtie2 archive is ~19 GB, which at
  # 2.4 MB/s would take ~2h20m). --retry-all-errors covers transient
  # 5xx/timeouts; -C - resumes a partial download on retry.
  CURL=(curl -L --connect-timeout 30 --max-time 14400
        --retry 5 --retry-delay 30 --retry-all-errors
        -C - --fail --show-error)

  echo "=== Fetching auxiliary bundle: ${INDEX}.tar ==="
  "${CURL[@]}" -o "${INDEX}.tar"  "${BASE}/${INDEX}.tar"
  "${CURL[@]}" -o "${INDEX}.md5"  "${BASE}/${INDEX}.md5" || true

  echo "=== Fetching bowtie2 indexes: ${INDEX}_bt2.tar ==="
  "${CURL[@]}" -o "${INDEX}_bt2.tar"  "${BASE}/bowtie2_indexes/${INDEX}_bt2.tar"
  "${CURL[@]}" -o "${INDEX}_bt2.md5" "${BASE}/bowtie2_indexes/${INDEX}_bt2.md5" || true

  echo "=== md5 verification (where available) ==="
  for sum in "${INDEX}.md5" "${INDEX}_bt2.md5"; do
      if [ -s "$sum" ]; then
          md5sum -c "$sum" || { echo "md5 mismatch on $sum"; exit 1; }
      fi
  done

  echo "=== Extract both archives into /output/bowtie2/ ==="
  tar -xf "${INDEX}.tar"
  tar -xf "${INDEX}_bt2.tar"

  # Write the marker file metaphlan reads when callers don't pass --index
  echo "${INDEX}" > mpa_latest

  # Drop the .tar files; only the extracted contents need to be published
  rm -f "${INDEX}.tar" "${INDEX}_bt2.tar"

  echo "=== Final layout ==="
  ls -la

outputs:
  catalog: "*"

task_spec:
  cpu: 2
  mem: 8
