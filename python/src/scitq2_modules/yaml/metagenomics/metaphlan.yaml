name: metaphlan
version: "1.4.0"
description: |
  MetaPhlAn taxonomic profiling on per-sample paired (or single-end)
  fastqs. The companion `metagenomics/metaphlan_catalog` module is
  auto-injected via `requires:` so a workflow only needs:

    - import: metagenomics/metaphlan
      inputs: ...

  and the catalog download / mount happens transparently.

# Pull the companion catalog setup module into any workflow that imports
# us. The YAML runner auto-injects `- import: metagenomics/metaphlan_catalog`
# ahead of this step and auto-wires `depends: metaphlan_catalog`, so a
# template just needs `- import: metagenomics/metaphlan` to get the full
# catalog+compute pair wired correctly.
requires:
  - metagenomics/metaphlan_catalog

vars:
  METAPHLAN_VERSION: "4.1"
  # ChocoPhlAn catalog index. The cond: gives a sensible default per
  # MetaPhlAn major version, so workflows can simply set
  # METAPHLAN_VERSION and get a working catalog. To pin a different
  # release, override this var directly at the step level — a step-level
  # value replaces this whole cond: dict via vars merge. Mirrored
  # byte-for-byte in `metagenomics/metaphlan_catalog` so both modules
  # compute the same name and land in the same cache slot. See:
  # http://cmprod1.cibio.unitn.it/biobakery4/metaphlan_databases/
  METAPHLAN_INDEX:
    cond: METAPHLAN_VERSION
    "4.0": "mpa_vOct22_CHOCOPhlAnSGB_202212"
    "4.1": "mpa_vOct22_CHOCOPhlAnSGB_202403"
    "4.2": "mpa_vJan25_CHOCOPhlAnSGB_202503"
  # CLI flag used to point at the database directory. 4.0 / 4.1 use
  # --bowtie2db; 4.2 renamed it to --db_dir. Mirrored in
  # metaphlan_catalog so both modules stay in sync via cond:.
  METAPHLAN_DB_FLAG:
    cond: METAPHLAN_VERSION
    "4.2": "--db_dir"
    "4.1": "--bowtie2db"
    "4.0": "--bowtie2db"

container:
  cond: METAPHLAN_VERSION
  "4.0": "gmtscience/metaphlan4:4.0.6.1"
  "4.1": "gmtscience/metaphlan4:4.1"
  "4.2": "gmtscience/metaphlan:4.2.4"

# Pull the database in from the workspace cache populated by
# metaphlan_catalog. The cache is keyed by index name (not just major
# version) so multiple catalogs for the same metaphlan release coexist
# without overwriting each other. The `|mv:bowtie2` action un-flattens
# the download so the directory layout matches what MetaPhlAn expects
# at runtime.
resource:
  - "{RESOURCE_ROOT}/metaphlan/{METAPHLAN_INDEX}/bowtie2/|mv:bowtie2"

command: |
  . /builtin/std.sh

  pigz -dc /input/*.fastq.gz | metaphlan \
      --input_type fastq --no_map --offline \
      {METAPHLAN_DB_FLAG} /resource/bowtie2 \
      --nproc $CPU \
      -o /output/{SAMPLE}.metaphlan4_profile.txt \
      2>&1 > /output/{SAMPLE}.metaphlan4.log

outputs:
  metaphlan: "*.txt"
  logs: "*.log"

task_spec:
  cpu: 8
