scitq:
  port: 50051
  db_url: "postgres://scitq_user:certainlynottherightpassword@localhost/scitq2?sslmode=disable"
  log_level: "info"
  log_root: "/var/lib/scitq/tasks"
  script_root: "/var/lib/scitq/scripts"
  script_venv: "/var/lib/scitq/python"
  script_runner_user: nobody
  server_name: "alpha2"
  server_fqdn: "alpha2.gmt.bio"
  client_download_token: "ChangeMeImInsecured1"
  worker_token: "ChangeMeImInsecured2"
  jwt_secret: "ChangeMeImInsecured3"
  certificate_key: "/path/to/privkey.pem"
  certificate_pem: "/path/to/fullchain.pem"
  idle_timeout: 300
  docker_credentials:
  - registry: myprivate.docker.registry.net
    secret: ChangeMeImLikelyNotTheRightPasswordAnyway
providers:
  azure:
    primary:
      default_region: swedencentral
      subscription_id: 12345678-1234-abcd-1234-123456789abc
      client_id: 12345678-1234-abcd-1234-123456789abc
      client_secret: ~whateve~the~real~password~is~
      tenant_id: 12345678-1234-abcd-1234-123456789abc
      update_periodicity: 10m
      image:
        publisher: "Canonical"
        offer: "ubuntu-24_04-lts"
        sku: "server"
        version: "latest"
      # gpu_image is the image booted for has_gpu=true flavors (Standard_N*).
      # The defaults below come from config.AzureGPUImage —
      #   microsoft-dsvm/ubuntu-hpc/2204/latest (Microsoft's HPC image,
      #   free, ships NVIDIA drivers + CUDA + nvidia-container-toolkit +
      #   docker preconfigured for `--gpus all`).
      # Uncomment only to override (e.g. NVIDIA's own GPU-Optimized VMI).
      # gpu_image:
      #   publisher: "microsoft-dsvm"
      #   offer:     "ubuntu-hpc"
      #   sku:       "2204"
      #   version:   "latest"
      quotas:
        swedencentral:
          cpu: 340
        westeurope:
          cpu: 350
      local_workspaces:
        swedencentral: "azswed://rnd/workspace"
        westeurope: "azwest://rnd/workspace"
  openstack:
    ovh:
      auth_url: https://auth.cloud.ovh.net/v3
      username: user-MyUserName
      password: ProbablyNotTheRightPasswordEither
      user_domain_name: Default
      project_id: 123456789abcdef
      project_name: "12345678901234567890"
      project_domain_id: default
      network_id: Ext-Net
      image_id: "Ubuntu 24.04"
      # gpu_image_id is used for has_gpu=true flavors. Defaults to
      # "NVIDIA GPU Cloud (NGC)" (OVH's Ubuntu 22.04 with NVIDIA
      # drivers + nvidia-container-toolkit + docker preconfigured for
      # `--gpus all`). Override only if your catalog uses a different
      # name — `openstack image list --tag gpu` lists candidates.
      # gpu_image_id: "NVIDIA GPU Cloud (NGC)"
      keypair: mykeyname
      identity_api_version: 3
      update_periodicity: 10m
      local_workspaces:
        GRA11: "s3://rnd/workspace"
        GRA7: "s3://rnd/workspace"
      quotas:
        GRA11:
          cpu: 2044
        GRA7:
          cpu: 2048
      custom:
        ovh_endpoint: ovh-eu
        ovh_application_key: "123456789abcd"
        ovh_application_secret: "0123456789abcdef01234567890abc"
        ovh_consumer_key: "0123456789abcdef01234567890abcde"
rclone:
    azswed:
        account: rnd1
        key: super+password+whatever==
        type: azureblob
    azwest:
        account: rnd1
        key: super+password+whatever==
        type: azureblob
    s3:
        access_key_id: 0123456789abcdef01234567890ab
        acl: private
        endpoint: https://s3.gra.io.cloud.ovh.net
        env_auth: "false"
        provider: Other
        region: gra
        secret_access_key: 0123456789abcdef01234567890cd
        type: s3
