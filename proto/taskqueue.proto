syntax = "proto3";

package taskqueue;

option go_package = "gen/taskqueuepb";

import "google/protobuf/empty.proto";

service TaskQueue {
    rpc SubmitTask(TaskRequest) returns (TaskResponse);
    rpc RegisterWorker(WorkerInfo) returns (WorkerId);
    rpc PingAndTakeNewTasks(PingAndGetNewTasksRequest) returns (TaskListAndOther);
    rpc UpdateTaskStatus(TaskStatusUpdate) returns (Ack);
    rpc SendTaskLogs(stream TaskLog) returns (Ack);
    rpc StreamTaskLogsOutput(TaskId) returns (stream TaskLog);
    rpc StreamTaskLogsErr(TaskId) returns (stream TaskLog);
    rpc GetLogsChunk(GetLogsRequest) returns (LogChunkList);
    rpc ListTasks (ListTasksRequest) returns (TaskList);
    rpc RetryTask (RetryTaskRequest) returns (TaskResponse);
    rpc ForceRunTask (ForceRunTaskRequest) returns (Ack); // Force W→P, bypassing dependency checks
    rpc EditAndRetryTask (EditAndRetryTaskRequest) returns (TaskResponse); // Edit command and retry a single task
    rpc EditTask (EditTaskRequest) returns (TaskResponse); // Update fields on a task in-place (no retry)
    rpc EditStepCommand (EditStepCommandRequest) returns (EditStepCommandResponse); // Find/replace in all failed tasks of a step and retry them
    rpc ListWorkers (ListWorkersRequest) returns (WorkersList);
    rpc CreateWorker(WorkerRequest) returns (WorkerIds);
    rpc CreateWorkerByName(CreateWorkerByNameRequest) returns (WorkerIds); // Name-based variant (resolves names to IDs)
    rpc UpdateWorkerStatus(WorkerStatus) returns (Ack);
    rpc DeleteWorker(WorkerDeletion) returns (JobId);
    rpc UpdateWorker(WorkerUpdateRequest) returns (Ack);
    rpc UserUpdateWorker(WorkerUpdateRequest) returns (Ack);
    rpc GetWorkerStatuses (WorkerStatusRequest) returns (WorkerStatusResponse);
    rpc ListJobs (ListJobsRequest) returns (JobsList);
    rpc GetJobStatuses (JobStatusRequest) returns (JobStatusResponse);
    rpc DeleteJob (JobId) returns (Ack);
    rpc UpdateJob(JobUpdate) returns (Ack);
    rpc ListFlavors (ListFlavorsRequest) returns (FlavorsList);
    rpc ListProviders(google.protobuf.Empty) returns (ProviderList);
    rpc ListRegions(google.protobuf.Empty) returns (RegionList);
    rpc CreateFlavor(FlavorCreateRequest) returns (FlavorId);
    rpc GetRcloneConfig(google.protobuf.Empty) returns (RcloneRemotes);
    rpc GetDockerCredentials(google.protobuf.Empty) returns (DockerCredentials);
    rpc Login(LoginRequest) returns (LoginResponse);
    rpc GetCertificate(google.protobuf.Empty) returns (Certificate);
    rpc Logout(Token) returns (Ack);
    rpc CreateUser(CreateUserRequest) returns (UserId);
    rpc ListUsers(google.protobuf.Empty) returns (UsersList);
    rpc DeleteUser(UserId) returns (Ack);
    rpc UpdateUser(User) returns (Ack);
    rpc ChangePassword(ChangePasswordRequest) returns (Ack);
    rpc AdminResetPassword(AdminResetPasswordRequest) returns (Ack);
    rpc ListRecruiters(RecruiterFilter) returns (RecruiterList);
    rpc CreateRecruiter(Recruiter) returns (Ack);
    rpc UpdateRecruiter(RecruiterUpdate) returns (Ack);
    rpc DeleteRecruiter(RecruiterId) returns (Ack);
    rpc ListWorkflows(WorkflowFilter) returns (WorkflowList);
    rpc CreateWorkflow(WorkflowRequest) returns (WorkflowId);
    rpc UpdateWorkflowStatus(WorkflowStatusUpdate) returns (Ack);
    rpc DeleteWorkflow(WorkflowId) returns (Ack);
    rpc DebugAssignTask(DebugAssignRequest) returns (Ack);
    rpc DebugRecruitStep(DebugRecruitRequest) returns (Ack);
    rpc DebugRetryTask(RetryTaskRequest) returns (TaskResponse);
    rpc ListDependentPendingTasks(TaskId) returns (TaskIds);
    rpc ListSteps(StepFilter) returns (StepList);
    rpc CreateStep(StepRequest) returns (StepId);
    rpc DeleteStep(StepId) returns (Ack);
    rpc GetStepStats(StepStatsRequest) returns (StepStatsResponse);
    rpc GetWorkerStats (GetWorkerStatsRequest) returns (GetWorkerStatsResponse);
    rpc FetchList (FetchListRequest) returns (FetchListResponse);
    rpc FetchInfo (FetchListRequest) returns (FetchInfoResponse);
    // Template system
    rpc UploadTemplate(UploadTemplateRequest) returns (UploadTemplateResponse);
    rpc DownloadTemplate(DownloadTemplateRequest) returns (FileContent);
    rpc RunTemplate(RunTemplateRequest) returns (TemplateRun);
    rpc ListTemplates(TemplateFilter) returns (TemplateList);
    rpc UpdateTemplate(UpdateTemplateRequest) returns (Template);
    rpc ListTemplateRuns(TemplateRunFilter) returns (TemplateRunList);
    rpc UpdateTemplateRun(UpdateTemplateRunRequest) returns (Ack);
    rpc DeleteTemplateRun(DeleteTemplateRunRequest) returns (Ack);
    // Register a local run (python script that doesn't come from an uploaded
    // template). Creates a template_run row with a NULL workflow_template_id
    // and records script identity so "what launched this workflow?" stays
    // answerable. The returned template_run_id should be set on
    // UpdateTemplateRun once the workflow is created (same flow as
    // server-launched templates).
    rpc RegisterAdhocRun(RegisterAdhocRunRequest) returns (TemplateRun);
    // Module system
    rpc UploadModule(UploadModuleRequest) returns (Ack);
    rpc ListModules(google.protobuf.Empty) returns (ModuleList);
    rpc ListModulesFiltered(ModuleListFilter) returns (ModuleList);
    rpc DownloadModule(DownloadModuleRequest) returns (FileContent);
    rpc UpgradeBundledModules(UpgradeBundledModulesRequest) returns (UpgradeBundledModulesResponse);
    rpc GetModuleOrigin(ModuleOriginRequest) returns (ModuleOriginResponse);
    rpc ForkModule(ForkModuleRequest) returns (Ack);
    rpc GetWorkspaceRoot(WorkspaceRootRequest) returns (WorkspaceRootResponse);
    rpc GetResourceRoot(WorkspaceRootRequest) returns (WorkspaceRootResponse);
    rpc RegisterSpecifications(ResourceSpec) returns (Ack);
    // Worker events
    rpc ReportWorkerEvent(WorkerEvent) returns (Ack);
    rpc ListWorkerEvents(WorkerEventFilter) returns (WorkerEventList);
    rpc DeleteWorkerEvent(WorkerEventId) returns (Ack);
    rpc PruneWorkerEvents(WorkerEventPruneFilter) returns (WorkerEventPruneResult);
    rpc GetTaskStatusCounts(TaskStatusCountsRequest) returns (TaskStatusCountsResponse);
    rpc SignalTask(TaskSignalRequest) returns (Ack);
    // Returns the server's own build identity so callers (CLI, worker) can
    // detect a version mismatch. Cheap, unauthenticated lookup — version
    // info is not a secret. See specs/worker_autoupgrade.md (Phase I).
    rpc ServerVersion(google.protobuf.Empty) returns (ServerVersionResponse);
}

message TaskResponse {
    int32 task_id = 1;
}

message WorkerInfo {
    string name = 1;
    optional int32 concurrency = 2;
    optional bool is_permanent = 3;
    optional string provider = 4;
    optional string region = 5;
    // Build identity, reported on registration so the server can flag
    // out-of-date workers. Phase I (visibility-only). See
    // specs/worker_autoupgrade.md.
    optional string version = 6;     // semver+suffix, e.g. "v0.7.7-dev"
    optional string commit = 7;      // full git SHA
    optional string build_arch = 8;  // GOOS/GOARCH, e.g. "linux/amd64"
}

message ServerVersionResponse {
    string version = 1;     // server semver+suffix
    string commit = 2;      // full git SHA
    string build_arch = 3;  // GOOS/GOARCH (informational)
    bool urgent = 4;        // reserved for Phase II — server build is flagged urgent
}

message TaskRequest {
    string command = 1;
    optional string shell = 2;
    string container = 3;
    optional string container_options = 4;
    optional int32 step_id = 5;
    repeated string input = 6;
    repeated string resource = 7;
    optional string output = 8;
    optional int32 retry = 9;
    optional bool is_final  = 10;
    optional bool uses_cache  = 11;
    optional float download_timeout  = 12;
    optional float running_timeout  = 13;
    optional float upload_timeout  = 14;
    string status = 15;
    repeated int32 dependency = 16; // IDs of tasks that this task depends on
    optional string task_name = 17;
    bool skip_if_exists = 18;
    bool accept_failure = 19; // If true, dependencies accept failed prerequisites
    optional string publish = 20; // Publish path (copied from output on success only)
    optional string reuse_key = 21; // SHA-256 hex for opportunistic reuse — producer side: always set when content is reuse-eligible (step not untrusted)
    optional bool consume_reuse = 22; // If true, server may reuse a cached result for this task (consumer side, set from workflow-level `opportunistic` flag)
}

message Task {
    int32 task_id = 1;
    string command = 2;
    optional string shell = 3;
    string container = 4;
    optional string container_options = 5;
    optional int32 step_id = 6;
    repeated string input = 7;
    repeated string resource = 8;
    optional string output = 9;
    optional int32 retry = 10;
    optional bool is_final  = 11;
    optional bool uses_cache  = 12;
    optional float download_timeout  = 13;
    optional float running_timeout  = 14;
    optional float upload_timeout  = 15;
    string status = 16;
    optional int32 worker_id = 17;
    optional int32 workflow_id = 18;
    optional string task_name = 19;
    int32 retry_count = 20;
    bool hidden = 21;
    optional int32 previous_task_id = 22;
    optional double weight = 23; // Fraction of the assigned worker's concurrency consumed by this task (default 1.0)
    optional int64 run_start_time = 24; // epoch timestamp of the first task start time
    bool skip_if_exists = 25;
    optional string publish = 26; // Publish path (output copied here on success only)
    optional string reuse_key = 27; // SHA-256 hex for opportunistic reuse
    optional int32 download_duration = 28; // seconds spent downloading inputs
    optional int32 run_duration = 29;      // seconds spent running the command
    optional int32 upload_duration = 30;   // seconds spent uploading outputs
    optional double quality_score = 31;    // quality score (higher is better)
    optional string quality_vars = 32;     // JSON: extracted quality variables
}

message TaskList {
    repeated Task tasks = 1;
}

message RetryTaskRequest {
    int32 task_id = 1;
    optional int32 retry = 2;
}

message ForceRunTaskRequest {
    int32 task_id = 1;
}

message EditAndRetryTaskRequest {
    int32 task_id = 1;
    string command = 2; // New command to use for the retry
}

// StringList wraps a `repeated string` so it can be carried as `optional`
// in EditTaskRequest. Required because proto3 doesn't natively support
// `optional repeated`. Semantics in the requests that use it:
//   - field absent (nil pointer)        → leave the underlying list alone
//   - field present, values empty slice → clear the underlying list
//   - field present, values non-empty   → replace the underlying list
message StringList {
    repeated string values = 1;
}

// EditTaskRequest updates fields on an existing task in place, without
// triggering a retry (use EditAndRetryTask for that). Only fields whose
// `optional` is set are touched; everything else is left as-is. The server
// rejects status transitions into worker-managed running states ("A", "C",
// "D", "O", "R", "U", "V") to avoid stomping on the workload's lifecycle.
message EditTaskRequest {
    int32 task_id = 1;
    optional string command = 2;
    optional string container = 3;
    optional string container_options = 4;
    optional string shell = 5;
    optional string status = 6;        // e.g. "P", "W", "F", "S"
    optional StringList input = 7;
    optional StringList resource = 8;
    optional string output = 9;
    optional string publish = 10;
    optional int32 retry = 11;
}

message EditStepCommandRequest {
    int32 step_id = 1;
    string find = 2;       // Plain text or regexp pattern to find
    string replace = 3;    // Replacement string
    bool is_regexp = 4;    // If true, find is a regexp pattern
}

message EditStepCommandResponse {
    int32 edited_count = 1;   // Number of tasks edited and retried
    repeated int32 new_task_ids = 2;
}

message Worker {
    int32 worker_id = 1;
    string name = 2;
    int32 concurrency = 3;
    int32 prefetch = 4;
    string status = 5;
    string ipv4 = 6;
    string ipv6 = 7;
    string flavor = 8;
    string provider = 9;
    string region = 10;
    optional int32 step_id = 11;
    optional string step_name = 12;
    bool is_permanent = 13;
    string recyclable_scope = 14;
    optional int32 workflow_id = 15;
    optional string workflow_name = 16;
    optional int32 flavor_cpu = 17;
    optional float flavor_mem = 18;
    optional float flavor_disk = 19;
    // Build identity (reported by the worker on registration; persisted
    // by the server). See specs/worker_autoupgrade.md.
    optional string version = 20;        // worker's semver+suffix
    optional string commit = 21;         // worker's git SHA
    optional string build_arch = 22;     // worker's GOOS/GOARCH
    // Derived upgrade status — computed live by the server from the
    // worker's commit vs. the server's current commit. One of:
    // "up_to_date" | "needs_upgrade" | "unsupported_arch" | "unknown"
    // (unknown = pre-Phase-I worker that didn't report build identity).
    optional string upgrade_status = 23;
}


message WorkersList {
    repeated Worker workers = 1;
}

message ListWorkersRequest {
  optional int32 workflow_id = 1;
}

message TaskUpdate {
    double weight = 1; 
}

message TaskUpdateList {
    map<int32, TaskUpdate> updates = 1; // optional — can be empty
}

message TaskSignal {
    int32 task_id = 1;
    string signal = 2;  // "K" = SIGKILL (docker kill), "T" = SIGTERM (docker stop)
    optional int32 grace_period = 3; // seconds before SIGKILL after SIGTERM (default: 10)
}

message TaskListAndOther {
    repeated Task tasks = 1;
    int32 concurrency = 2;
    TaskUpdateList updates = 3;
    repeated int32 active_tasks = 4;
    repeated TaskSignal signals = 6;  // tasks to signal on this worker
}

message TaskSignalRequest {
    int32 task_id = 1;
    string signal = 2; // "K" for kill, "T" for terminate (SIGTERM)
    optional int32 grace_period = 3; // seconds before SIGKILL after SIGTERM (default: 10)
}

message TaskStatusUpdate {
    int32 task_id = 1;
    string new_status = 2;
    optional int32 duration = 3; // in seconds
    optional bool free_retry = 4; // if new_status is F and this is true, then retry is increased by 1 before setting status to F
}

message TaskLog {
    int32 task_id = 1;
    string log_type = 2; // 'O' for stdout, 'E' for stderr
    string log_text = 3;
}

message GetLogsRequest {
  repeated int32 taskIds = 1;
    int32 chunkSize = 2;
  optional int32 skipFromEnd = 3;
  optional string log_type = 4;
}

message LogChunk {
  int32 taskId = 1;
  repeated string stdout = 2;
  repeated string stderr = 3;
}

message LogChunkList {
  repeated LogChunk logs = 1;
}

message TaskIds {
    repeated int32 task_ids = 1;
}

message TaskId {
    int32 task_id = 1;
}

message WorkerId {
    int32 worker_id = 1;
}

message WorkerDeletion {
    int32 worker_id = 1;
    optional bool undeployed = 2; // if true, the worker is already undeployed so deletion can proceed
}

message WorkerStatusRequest {
  repeated int32 worker_ids = 1;
}

message WorkerStatus {
  int32 worker_id = 1;
  string status = 2;
}

message WorkerStatusResponse {
  repeated WorkerStatus statuses = 1;
}

message WorkerDetails {
  int32 worker_id = 1;
  string worker_name = 2;
  int32 job_id = 3;
}

message WorkerIds {
  repeated WorkerDetails workers_details = 1;
}

message PingAndGetNewTasksRequest {
    int32 worker_id = 1;
    WorkerStats stats = 2; // Optional
}

message Ack {
    bool success = 1;
}

message ListTasksRequest {
    optional string status_filter = 1;
    optional int32 worker_id_filter = 2;
    optional int32 workflow_id_filter = 3;
    optional int32 step_id_filter = 4;
    optional string command_filter = 5;
    optional int32 limit = 6;
    optional int32 offset = 7;
    optional bool show_hidden = 8;
    // When true, the server clips Task.command to compact_command_max
    // characters (default 200) before returning. Used by the basic
    // `scitq task list` view so a kilobyte-scale shell script doesn't
    // get shipped over gRPC just to be truncated client-side. The full
    // command is still available via `task list -l/--long` (which omits
    // this flag).
    optional bool compact_command = 9;
    optional int32 compact_command_max = 10;
}

message WorkerRequest {
    int32 provider_id = 1;
    int32 flavor_id = 2;
    int32 region_id = 3;
    int32 number = 4;
    int32 concurrency = 5;
    int32 prefetch = 6;
    optional int32 step_id = 7;
}

message CreateWorkerByNameRequest {
    string provider = 1;    // e.g. "azure.primary" or "openstack.ovh"
    string flavor = 2;      // e.g. "Standard_D32s_v5"
    string region = 3;      // e.g. "swedencentral" (optional, defaults to provider default)
    int32 count = 4;        // number of workers (default: 1)
    int32 concurrency = 5;
    int32 prefetch = 6;
    optional int32 step_id = 7;
}

message WorkerUpdateRequest {
    int32 worker_id = 1;
    optional int32 provider_id = 2;
    optional int32 flavor_id = 3;
    optional int32 region_id = 4;
    optional int32 concurrency = 5;
    optional int32 prefetch = 6;
    optional int32 step_id = 7;
    optional bool is_permanent = 8;
    optional string recyclable_scope = 9;
    optional string workflow_name = 10;
    optional string step_name = 11;
}

message ListFlavorsRequest {
    int32 limit = 1 ;
    string filter = 2 ; 
}

message Flavor {
  // Fields from the "flavor" table
  int32 flavor_id      = 1;  // PRIMARY KEY
  string flavor_name    = 2;  // Name of the flavor
  int32 provider_id    = 3;  // Foreign key to provider table
  string provider = 4; // Name of the provider (provider_name.config_name)
  int32  cpu            = 5;  // Number of CPU cores
  float mem             = 6;  // Memory in GB (or as needed)
  float disk            = 7;  // Disk size in GB (or as needed)
  int32  bandwidth      = 8;  // Bandwidth (if applicable)
  string gpu            = 9;  // GPU description
  int32  gpumem         = 10;  // GPU memory (in GB, for example)
  bool   has_gpu        = 11; // Whether a GPU is present
  bool   has_quick_disks = 12; // Whether quick disks are supported

  // Fields from the "flavor_region" table
  int32 region_id      = 13; // Foreign key to region table
  string region         = 14; // (Optional) Region name
  float  eviction       = 15; // Eviction rate value
  float  cost           = 16; // Cost value
}

message FlavorsList {
    repeated Flavor flavors = 1;
}

message ListJobsRequest {
  optional int32 limit = 1;
  optional int32 offset = 2; 
}

message Job {
  int32 job_id = 1;
  string status = 2;
  int32 flavor_id = 3;
  int32 retry = 4;
  int32 worker_id = 5;
  string action = 6;
  string created_at = 7;
  string modified_at = 8;
  int32 progression = 9;
  string log = 10;
  optional string worker_name = 11;
  optional string flavor_info = 12; // e.g. "Standard_D8s_v3 — 8 CPU, 32GB mem"
}

message JobId {
    int32 job_id = 1;
}


message JobsList {
    repeated Job jobs = 1;
}

message JobStatusRequest {
  repeated int32 job_ids = 1;
}

message JobStatus {
  int32 job_id = 1;
  string status = 2;
  int32 progression = 3;
}

message JobStatusResponse {
  repeated JobStatus statuses = 1;
}

message JobUpdate {
  int32 job_id          = 1;             // which job to update
  optional string status = 2;             // 'P'|'R'|'S'|'F'|'X' (only if you want to set it)
  optional string append_log = 3;         // text appended to job.log (server prepends timestamp)
  optional int32 progression = 4;        // 0..100 (server clamps)
}

message RcloneRemotes {
    map<string, RcloneRemote> remotes = 1;
}

message RcloneRemote {
    map<string, string> options = 1;
}

message DockerCredential {
  string registry = 1;   // e.g., "3jfz1gy8.gra7.container-registry.ovh.net"
  string auth = 2;   // auth string as found in .docker/config.json
}

message DockerCredentials {
  repeated DockerCredential credentials = 1;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message LoginResponse {
    string token = 1;
}

message Certificate {
    string pem = 1;
}

message Token {
    string token = 1;
}

message CreateUserRequest {
  string username = 1;
  string password = 2;
  string email = 3;
  bool is_admin = 4;
}

message UserId {
  int32 user_id = 1;
}

message User {
  int32 user_id = 1;
  optional string username = 2;
  optional string email = 3;
  optional bool is_admin = 4;
}

message AdminResetPasswordRequest {
  int32 user_id = 1;
  string new_password = 2;
}

message UsersList {
  repeated User users = 1;
}

message ChangePasswordRequest {
    string username = 1;
  string old_password = 2;
  string new_password = 3;
}

message RecruiterFilter {
    optional int32 step_id = 1;
}

message RecruiterId {
    int32 step_id = 1;
    int32 rank = 2;
}

message Recruiter {
    int32 step_id = 1;
    int32 rank = 2;
    string protofilter = 3;
    optional int32 concurrency = 4;
    optional int32 prefetch = 5;
    optional int32 max_workers = 6;
    int32 rounds = 7;
    int32 timeout = 8;
    optional int32 cpu_per_task = 9;
    optional float memory_per_task = 10;
    optional float disk_per_task = 11;
    optional int32 prefetch_percent = 12;
    optional int32 concurrency_min = 13;
    optional int32 concurrency_max = 14;
}

message RecruiterUpdate {
  int32 step_id = 1;
  int32 rank = 2;
  optional string protofilter = 3;
  optional int32 concurrency = 4;
  optional int32 prefetch = 5;
  optional int32 max_workers = 6;
  optional int32 rounds = 7;
  optional int32 timeout = 8;
  optional int32 cpu_per_task = 9;
  optional float memory_per_task = 10;
  optional float disk_per_task = 11;
  optional int32 prefetch_percent = 12;
  optional int32 concurrency_min = 13;
  optional int32 concurrency_max = 14;
}

message RecruiterList {
    repeated Recruiter recruiters = 1;
}

message WorkflowFilter {
    optional string name_like = 1;
    optional int32 limit = 2;
    optional int32 offset = 3;
}

message WorkflowId {
    int32 workflow_id = 1;
}

message Workflow {
    int32 workflow_id = 1;
    string name = 2;
    string status = 3;
    string run_strategy = 4;
    optional int32 maximum_workers = 5;
    int32 total_tasks = 6;
    int32 succeeded_tasks = 7;
    int32 failed_tasks = 8;     // Terminal failures only
    int32 running_tasks = 9;    // Accepted + Running + Uploading
    int32 retrying_tasks = 10;  // Tasks currently being retried (failed once, clone in progress)
    bool live = 11;             // Live mode: prevents auto-completion of workflow
    // Launch provenance: lets "how was this workflow created?" be answered
    // without a follow-up query. For template-launched workflows,
    // template_name + template_version are set. For local-Python ad-hoc
    // runs, script_name (and optionally script_sha256) are set instead.
    // template_run_id is populated for both.
    optional int32 template_run_id = 12;
    optional string template_name = 13;
    optional string template_version = 14;
    optional string script_name = 15;
    optional string script_sha256 = 16;
}
message WorkflowRequest {
    string name = 1;
    optional string run_strategy = 2;
    optional int32 maximum_workers = 3;
    optional string status = 4;
    optional bool live = 5;     // Live mode: prevents auto-completion
}

message WorkflowList {
    repeated Workflow workflows = 1;
}

message WorkflowStatusUpdate {
    int32 workflow_id = 1;
    string status = 2;
    optional int32 maximum_workers = 3;
}

message DebugAssignRequest {
    int32 workflow_id = 1;
    int32 task_id = 2;
}

message DebugRecruitRequest {
    int32 workflow_id = 1;
    int32 step_id = 2;
}

message StepFilter {
    int32 WorkflowId = 1;
    optional int32 limit = 2;
    optional int32 offset = 3;
}

message StepId {
    int32 step_id = 1;
}
message Step {
    int32 step_id = 1;
    string workflow_name = 2;
    int32 workflow_id = 3;
    string name = 4;
    optional string quality_definition = 5; // JSON: {"variables": {...}, "formula": "..."}
}
message StepRequest {
    optional string workflow_name = 1;
    optional int32 workflow_id = 2;
    string name = 3;
    optional string quality_definition = 4; // JSON: {"variables": {...}, "formula": "..."}
}
message StepList {
    repeated Step steps = 1;
}

message StepStatsRequest {
    optional int32 workflow_id = 1;
    repeated int32 step_ids = 2;
}


message Accum {
    int32 count = 1;  // number of observations
    float sum = 2;    // total seconds
    float min = 3;    // minimum seconds
    float max = 4;    // maximum seconds
}

message StepStats {
    int32 step_id = 1;
    string step_name = 2;
    int32 total_tasks = 3;
    int32 waiting_tasks = 4;
    int32 pending_tasks = 5;
    int32 accepted_tasks = 6;
    int32 running_tasks = 7;
    int32 uploading_tasks = 8;
    int32 successful_tasks = 9;
    int32 failed_tasks = 10;
    int32 really_failed_tasks = 11; // tasks that have exhausted all retries and are failed
    Accum success_run = 12;     // succeeded tasks' run durations
    Accum failed_run = 13;      // failed tasks' run durations
    Accum running_run = 14;  // running tasks' elapsed durations (at eval time)
    Accum download = 15;        // download durations
    Accum upload = 16;          // upload durations
    optional int64 start_time = 17; // epoch timestamp of the first task start time
    optional int64 end_time = 18;   // epoch timestamp of the last task end time
    int32 stats_eval_time = 19; // epoch seconds when these stats were computed
}

message StepStatsResponse {
    repeated StepStats stats = 1;
}


message WorkerStats {
    float cpu_usage_percent = 1;      // 0-100, float
    float mem_usage_percent = 2;      // 0-100, float
    float load_1min = 3;               // e.g., 0.58, float
    float iowait_percent = 4;       // 0-100 float

    repeated DiskUsage disks = 5;      // Per-disk usage

    DiskIOStats disk_io = 6;            // Global disk IO (aggregated)
    NetIOStats net_io = 7;              // Global network IO (aggregated)
    int32 num_cpus = 8;                // Number of CPU cores on this worker
}

message DiskUsage {
    string device_name = 1;            // E.g., "/dev/sda1"
    float usage_percent = 2;            // 0-100, float
}

message DiskIOStats {
    int64 read_bytes_total = 1;        // Total bytes read
    int64 write_bytes_total = 2;       // Total bytes written
    float read_bytes_rate = 3;          // Bytes per second
    float write_bytes_rate = 4;         // Bytes per second
}

message NetIOStats {
    int64 recv_bytes_total = 1;        // Total bytes received
    int64 sent_bytes_total = 2;         // Total bytes sent
    float recv_bytes_rate = 3;          // Bytes per second
    float sent_bytes_rate = 4;          // Bytes per second
}

message GetWorkerStatsRequest {
    repeated int32 worker_ids = 1;
}

message GetWorkerStatsResponse {
    map<int32, WorkerStats> worker_stats = 1;
}

message FetchListRequest {
  string uri = 1; // URI to fetch the list from (can include glob patterns)
}

message FetchListResponse {
  repeated string files = 1; // Absolute paths from the given URI
}

message FetchInfoResponse {
  string uri = 1;
  string filename = 2;
  string description = 3;
  int64 size = 4;
  bool is_file = 5;
  bool is_dir = 6;
}


message UploadTemplateRequest {
  bytes script = 1;
  bool force = 2;
  optional string filename = 3;
}

message UploadTemplateResponse {
  bool success = 1;
  string message = 2;
  optional int32 workflow_template_id = 3;
  optional string name = 4;
  optional string version = 5;
  optional string description = 6;
  optional string param_json = 7;
}


message RunTemplateRequest {
  int32 workflow_template_id = 1;
  string param_values_json = 2;
  bool no_recruiters = 3;
}

message TemplateFilter {
  optional int32 workflow_template_id = 1;
  optional string name = 2;
  optional string version = 3;
  // When true, return every version that matches the other filters. The
  // default (false) collapses the result to one row per name — the
  // most-recently-uploaded version. Most operators want the latest by
  // default; pass all_versions=true (or `--all-versions` on the CLI) to
  // see history for upgrades, rollbacks, and audits.
  optional bool all_versions = 4;
  // When true, include hidden templates in the result. Default (false)
  // excludes them. See workflow_template.hidden (migration 24).
  optional bool show_hidden = 5;
}

message Template {
  int32 workflow_template_id = 1;
  string name = 2;
  string version = 3;
  string description = 4;
  string param_json = 5;
  string uploaded_at = 6;
  optional int32 uploaded_by = 7;
  bool hidden = 8;
  // How many versions exist for this name (counted across visible rows
  // honouring the same show_hidden filter as the listing). Populated only
  // when the server is collapsing to latest-per-name; in `all_versions`
  // mode every row is its own version, so the field stays 0/unset and
  // callers should ignore it. Used by the UI to decide whether to render
  // a "more versions" dropdown trigger.
  int32 version_count = 9;
}

// UpdateTemplateRequest carries an in-place edit of a workflow_template
// row. Currently only `hidden` is mutable — uploads still go through
// UploadTemplate which validates the script and bumps the version.
message UpdateTemplateRequest {
  int32 workflow_template_id = 1;
  optional bool hidden = 2;
}

message TemplateList {
  repeated Template templates = 1;
}

message TemplateRun {
  int32 template_run_id = 1;
  // 0 = ad-hoc run (local Python script, no template uploaded). For those,
  // see script_name / script_sha256 instead.
  int32 workflow_template_id = 2;
  optional string template_name = 3;
  optional string template_version = 4;
  optional string workflow_name = 5;
  optional int32 run_by = 6;
  string status = 7;
  optional int32 workflow_id = 8;
  string created_at = 9;
  string param_values_json = 10;
  optional string error_message = 11;
  optional string run_by_username = 12;
  optional string script_name = 13;    // ad-hoc runs only
  optional string script_sha256 = 14;  // ad-hoc runs only
}

message TemplateRunList {
  repeated TemplateRun runs = 1;
}

message TemplateRunFilter {
  optional int32 workflow_template_id = 1;
}

message UpdateTemplateRunRequest {
  int32 template_run_id = 1;
  optional int32 workflow_id = 2;
  optional string error_message = 3;
  // JSON-encoded array of pin objects (see specs/module_library.md).
  // The yaml_runner snapshots the concrete (path, version) it resolved
  // for each `import:` so replays can use identical module content.
  optional string module_pins = 4;
}

message WorkspaceRootRequest {
  string provider = 1; // e.g., "azure.default" or "openstack.ovh"
  string region   = 2; // e.g., "northeurope"
}

message WorkspaceRootResponse {
  string root_uri = 1; // e.g., "aznorth://workspace"
}

message DeleteTemplateRunRequest {
  int32 template_run_id = 1;
}

// Ad-hoc (local Python) run registration — no uploaded template, just a
// script file with some params. The server stores it as a template_run with
// workflow_template_id=NULL.
message RegisterAdhocRunRequest {
  string script_name   = 1;  // bare filename of the launching script
  string script_sha256 = 2;  // SHA-256 of the script file's content (hex)
  string param_values_json = 3; // JSON snapshot of the params the user ran with
  // module_pins_json stores the Python versioning knobs — typically
  // {"scitq2":"0.7.4"} so replays can check compatibility against later
  // upgrades. Same column as YAML's per-module pins, different shape.
  string module_pins_json = 4;
}

// Template download
message DownloadTemplateRequest {
  optional int32 workflow_template_id = 1;
  optional string name = 2;
  optional string version = 3;
}

// Module management
message UploadModuleRequest {
  string filename = 1;
  bytes content = 2;
  bool force = 3;
}

message ModuleList {
  // Flat list of `path@version` strings. Kept for backward compatibility.
  repeated string modules = 1;
  // Structured view — populated by newer callers. Old callers can ignore it.
  repeated ModuleEntry entries = 2;
}

message ModuleEntry {
  string path = 1;
  string version = 2;
  string origin = 3;      // "bundled" | "local" | "forked"
  string description = 4;
}

// Filter for ListModulesFiltered. All fields optional: an empty request
// returns the same data as `ListModules` (all rows).
message ModuleListFilter {
  // Restrict results to one module path (e.g. 'genomics/fastp') — returns
  // every version at that path. Matches the `scitq module list
  // --versions X` use case.
  optional string path = 1;
  // If true, return only the highest-ordered version per path.
  optional bool latest_only = 2;
  // Origin filter — case-insensitive, accepts full word ('bundled',
  // 'local', 'forked') or single letter ('B', 'L', 'F'). Matches the
  // `scitq module list --origin X` use case, typically used to audit
  // pre-library files that were auto-imported as origin=local at server
  // startup.
  optional string origin = 3;
}

message DownloadModuleRequest {
  string filename = 1;
}

// `scitq module upgrade` seeds/updates bundled YAML modules in the server-side
// module library from the installed scitq2_modules Python package.
// See specs/module_library.md.
message UpgradeBundledModulesRequest {
  // If false (default), the server returns the diff the upgrade would apply
  // without touching the DB. If true, the changes are committed.
  bool apply = 1;
}

message UpgradeBundledModulesResponse {
  // Human-readable multi-line report of the scanned bundled modules and the
  // action taken (or that would be taken in dry-run).
  string report = 1;
  // Summary counters — useful for scripted callers that don't want to parse
  // the text report.
  int32 inserted = 2;         // bundled rows newly inserted
  int32 forks_preserved = 3;  // existing origin=F rows left alone
  int32 conflicts = 4;        // same (path,version) re-shipped with different bytes
  int32 skipped = 5;          // bundled modules without a version field
  int32 up_to_date = 6;       // bundled rows already present with matching content
}

// Single-row origin lookup. `version` is optional — empty means "latest".
message ModuleOriginRequest {
  string path = 1;
  string version = 2;
}

message ModuleOriginResponse {
  string path = 1;
  string version = 2;
  string origin = 3;          // "bundled" | "local" | "forked"
  string content_sha256 = 4;
  string bundled_sha256 = 5;  // set on forked rows; the pre-fork content hash
  string description = 6;
  string uploaded_at = 7;     // RFC3339
  string uploaded_by = 8;     // username, empty if unknown or system-seeded
  bool fork_is_outdated = 9;  // true if a newer bundled content at the same path has shipped since the fork
}

// Create a new forked row by cloning a bundled module to a new version.
// Content is taken from the source row; caller typically follows up with
// `scitq module download` + edit + `scitq module upload --force`.
message ForkModuleRequest {
  string source_path = 1;
  string source_version = 2;  // optional; empty → latest bundled at source_path
  string new_version = 3;     // required; rejected if already present
}

message FileContent {
  string filename = 1;
  bytes content = 2;
}

message ResourceSpec {
  string worker_id = 1;
  int32 cpu = 2;
  float mem = 3;
  float disk = 4;
}

message WorkerEvent {
  // optional because a worker may fail before registration
  optional int32 worker_id   = 1;
  string  worker_name         = 2;  // free text (hostname or generated name)
  string  level               = 3;  // single letter: D/I/W/E
  string  event_class         = 4;  // e.g. "install", "bootstrap", "runtime", "network"
  string  message             = 5;  // short human description
  string  details_json        = 6;  // raw JSON string (optional)
}

message WorkerEventFilter {
  optional int32 worker_id = 1;
  optional string level     = 2; // 'D','I','W','E'
  optional string class     = 3; // event_class filter
  optional int32 limit     = 4; // max number of events (default 50)
}

message WorkerEventRecord {
  int32 event_id   = 1;
  string created_at = 2;
  optional int32 worker_id = 3;
  string  worker_name = 4;
  string  level       = 5;
  string  event_class = 6;
  string  message     = 7;
  string  details_json= 8;
}

message WorkerEventList {
  repeated WorkerEventRecord events = 1;
}

message WorkerEventId {
  int32 event_id = 1;
}

message WorkerEventPruneFilter {
  optional string before   = 1; // RFC3339 UTC, e.g. "2025-08-19T00:00:00Z"
  optional string level    = 2; // 'D'|'I'|'W'|'E'
  optional string class    = 3; // event_class exact match
  optional int32 worker_id = 4;
  bool dry_run             = 5; // if true, count only; no deletion
}

message WorkerEventPruneResult {
  int32 matched = 1;
  int32 deleted = 2;
}

message Provider {
  int32 provider_id = 1;
  string provider_name = 2;
  string config_name = 3;
}

message ProviderList {
  repeated Provider providers = 1;
}

message Region {
  int32 region_id = 1;
  int32 provider_id = 2;
  string region_name = 3;
  bool is_default = 4;
}

message RegionList {
  repeated Region regions = 1;
}

message FlavorCreateRequest {
  string provider_name = 1;
  string config_name = 2;
  string flavor_name = 3;
  int32 cpu = 4;
  float memory = 5;
  float disk = 6;
  optional int32 bandwidth = 7;
  optional string gpu = 8;
  optional int32 gpumem = 9;
  optional bool has_gpu = 10;
  optional bool has_quick_disks = 11; 
  repeated string region_names = 12;
  repeated float costs = 13;
  repeated float evictions = 14;
}

message FlavorId {
 int32 flavor_id = 1;
}

message TaskStatusCountsRequest {
    optional bool show_hidden = 1;
}

message StatusCountEntry {
    string status = 1;
    int32 count = 2;
    optional int32 worker_id = 3;
}

message TaskStatusCountsResponse {
    repeated StatusCountEntry global_counts = 1;
    repeated StatusCountEntry per_worker_counts = 2;
    int32 total_count = 3;
}
